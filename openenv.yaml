spec_version: 1
name: support-triage-env
type: space
runtime: fastapi
app: server.app:app
port: 7860

version: "1.0.0"
description: >
  A real-time customer support ticket triage and resolution environment
  where an AI agent classifies, prioritizes, and drafts responses to live
  support tickets fetched dynamically from public APIs. Models real-world
  helpdesk workflows with continuous partial-credit reward signals.
author: "yashaskn8"
homepage: "https://huggingface.co/spaces/yashaskn01/support-triage-env"
repository: "https://github.com/yashaskn8/Support-Ticket-Triage-Environment"
space_url: https://huggingface.co/spaces/yashaskn01/support-triage-env
license: "MIT"
python_requires: ">=3.11"
tags:
  - openenv
  - customer-support
  - nlp
  - triage
  - real-world
  - real-time-data
novel_mechanics:
  - id: trajectory_consistency_bonus
    description: >
      Cross-step episode-level bonus of up to 0.10 rewarding 
      consistent, improving agent behaviour. First implementation 
      of a trajectory-level reward signal in the OpenEnv ecosystem.
  - id: dual_source_ground_truth
    description: >
      Ground truth labels derived from GitHub native taxonomy 
      for live tickets and TF-IDF phrase weights for synthetic 
      tickets, ensuring grader and oracle are provably independent.
  - id: nine_dimensional_resolve_grader
    description: >
      Deterministic nine-dimensional heuristic grader including 
      specificity and coherence dimensions that cannot be 
      satisfied by generic template responses.
  - id: continuous_evidence_scaled_classify
    description: >
      Continuous reward signal in [0.0, 1.0] using keyword 
      evidence density to scale rewards within each match tier, 
      providing gradient information throughout the episode.
tasks:
  - id: classify
    name: "Ticket Classification"
    difficulty: easy
    max_steps: 10
    description: >
      Classify each incoming support ticket into exactly one of five
      categories: BILLING, TECHNICAL, ACCOUNT, SHIPPING, GENERAL.
      Graded by confidence-weighted keyword density heuristic with
      partial credit for super-category proximity.
  - id: prioritize
    name: "Ticket Prioritization & Routing"
    difficulty: medium
    max_steps: 10
    description: >
      Assign a priority level, route to the correct team, and estimate
      resolution time in hours. Multi-dimensional scoring with weighted
      partial credit across all three output dimensions.
  - id: resolve
    name: "Full Ticket Resolution Draft"
    difficulty: hard
    max_steps: 5
    description: >
      Draft a complete professional customer-facing response using the
      ticket content, inferred metadata, and dynamically retrieved
      knowledge context. Scored across nine dimensions: structure,
      KB compliance, length, commitment clarity, escalation accuracy,
      specificity, coherence, required and forbidden elements.
api:
  base_path: /
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state
  health_endpoint: /health
  tasks_endpoint: /tasks
  data_source_endpoint: /data-source
data_sources:
  primary: github_issues_api
  secondary: realistic_synthetic
  tertiary: hackernews_algolia
  fallback: inline_static
reward_mechanics:
  trajectory_consistency_bonus:
    description: >
      End-of-episode bonus (up to +0.10) awarded on the final step
      when the agent demonstrates consistent improving behaviour.
      Evaluates four criteria: monotonic improvement tendency,
      no catastrophic steps, low reward variance, and above-baseline
      mean reward. Each criterion contributes 0.025 to the bonus.
    max_bonus: 0.10
    criteria_count: 4
    min_steps_required: 3
  global_penalties:
    repetition_penalty: -0.10
    schema_abuse_penalty: -0.10
runtime_constraints:
  max_inference_runtime_seconds: 480
  max_memory_mb: 700
  target_vcpu: 2
